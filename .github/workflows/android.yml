name: CI

on: 
  workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "corretto"
          cache: gradle
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Find and Stage APK
        run: |
          mkdir -p output_apk
          find . -name "*.apk" -exec cp {} output_apk/ \;

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RiMusic-Custom-APK
          path: output_apk/
